        .water-ripple-button {
  position: relative;
  overflow: hidden; /* This is crucial to keep the ripple inside the button */
  
  color: white;
  padding: 15px 30px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  outline: none;
}

.water-ripple-button:hover {
  /* background-color: rgba(147, 255, 250, 0.5);Optional: background change on hover */
  color: black;

}

/* Create the ripple element on hover */
.water-ripple-button::before {
  content: "";
  color: #000;
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(16, 131,137, 0.5); /* Semi-transparent white "water" */
  /* border-radius: 50%; */
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: width 0.1s ease-out, height 0.5s ease-out, opacity 0.7s ease-out;
}

.water-ripple-button:hover::before {
  width: 100%; /* Expand the ripple size */
  height: 300px; /* Expand the ripple size */
  opacity: 1; /* Fade in the ripple */
}
